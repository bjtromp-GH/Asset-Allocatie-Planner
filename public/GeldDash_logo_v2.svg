<svg width="600" height="160" viewBox="0 0 600 160" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="logoGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#059669" />
      <stop offset="100%" stop-color="#0d9488" />
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="3" />
      <feOffset dx="2" dy="2" result="offsetblur" />
      <feComponentTransfer>
        <feFuncA type="linear" slope="0.3" />
      </feComponentTransfer>
      <feMerge>
        <feMergeNode />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
  </defs>

  <!-- Token Icon -->
  <g filter="url(#shadow)">
    <circle cx="80" cy="80" r="60" fill="white" />
    <circle cx="80" cy="80" r="52" fill="url(#logoGradient)" />
    
    <!-- Stylized G as a Coin -->
    <path d="M95 85H80V90H92C91 100 85 106 78 106C68 106 60 98 60 88C60 78 68 70 78 70C85 70 91 74 94 80L102 76C98 68 89 62 78 62C64 62 52 74 52 88C52 102 64 114 78 114C88 114 97 108 102 100C103 98 104 96 104 94V84H95V85Z" fill="white" />
    
    <!-- Accent Sparkle -->
    <circle cx="106" cy="60" r="10" fill="#F59E0B" stroke="white" stroke-width="2" />
  </g>

  <!-- GeldDash Text -->
  <text x="160" y="95" font-family="Inter, system-ui, sans-serif" font-weight="900" font-size="72" fill="#059669" letter-spacing="-2">Geld</text>
  <text x="330" y="95" font-family="Inter, system-ui, sans-serif" font-weight="900" font-size="72" fill="#F59E0B" letter-spacing="-2">Dash</text>
  
  <!-- Slogan -->
  <text x="164" y="130" font-family="Inter, system-ui, sans-serif" font-weight="600" font-size="20" fill="#94a3b8" letter-spacing="2">FINANCIEEL OVERZICHT</text>
  
  <!-- Decorative Dash Line -->
  <rect x="495" y="85" width="60" height="8" rx="4" fill="#F59E0B" />
</svg>
